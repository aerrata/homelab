name: radarr
configs:
  serve.json:
    content: |
      {"TCP":{"443":{"HTTPS":true}},"Web":{"$${TS_CERT_DOMAIN}:443":{"Handlers":{"/":{"Proxy":"http://127.0.0.1:${TAILSCALE_PORT}"}}}},"AllowFunnel":{"$${TS_CERT_DOMAIN}:443":false}}
services:
  radarr:
    image: ghcr.io/hotio/radarr:${RADARR_VERSION}
    restart: unless-stopped
    environment:
      - PUID=${RADARR_PUID}
      - PGID=${RADARR_PGID}
      - UMASK=002
      - WEBUI_PORTS=7878/tcp
    volumes:
      - "${RADARR_CONFIG_PATH}:/config"
      - "${RADARR_DATA_PATH}:/data"
    network_mode: service:tailscale
    depends_on:
      - tailscale
  tailscale:
    image: tailscale/tailscale:${TAILSCALE_VERSION}
    restart: unless-stopped
    hostname: ${TAILSCALE_MACHINE_NAME}
    ports:
      - "${RADARR_PORT}:7878/tcp"
    environment:
      - TS_AUTHKEY=${TAILSCALE_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_SERVE_CONFIG=/config/serve.json
      - TS_USERSPACE=false
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - net_admin
    configs:
      - source: serve.json
        target: /config/serve.json
    volumes:
      - ${TAILSCALE_STATE_PATH}:/var/lib/tailscale
