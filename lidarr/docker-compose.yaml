name: lidarr
configs:
  serve.json:
    content: |
      {"TCP":{"443":{"HTTPS":true}},"Web":{"$${TS_CERT_DOMAIN}:443":{"Handlers":{"/":{"Proxy":"http://127.0.0.1:${TAILSCALE_PORT}"}}}},"AllowFunnel":{"$${TS_CERT_DOMAIN}:443":false}}
services:
  lidarr:
    image: ghcr.io/hotio/lidarr:${LIDARR_VERSION}
    restart: unless-stopped
    environment:
      - PUID=${LIDARR_PUID}
      - PGID=${LIDARR_PGID}
      - UMASK=002
      - WEBUI_PORTS=8686/tcp
    volumes:
      - "${LIDARR_CONFIG_PATH}:/config"
      - "${LIDARR_DATA_PATH}:/data"
      - "${QBITTORRENT_DOWNLOADS_PATH}:/downloads"
    network_mode: service:tailscale
    depends_on:
      - tailscale
  tailscale:
    image: tailscale/tailscale:${TAILSCALE_VERSION}
    restart: unless-stopped
    hostname: ${TAILSCALE_MACHINE_NAME}
    ports:
      - "${LIDARR_PORT}:8686/tcp"
    environment:
      - TS_AUTHKEY=${TAILSCALE_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_SERVE_CONFIG=/config/serve.json
      - TS_USERSPACE=false
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - net_admin
    configs:
      - source: serve.json
        target: /config/serve.json
    volumes:
      - ${TAILSCALE_STATE_PATH}:/var/lib/tailscale